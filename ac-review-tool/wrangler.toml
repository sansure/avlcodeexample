name = "ac-review-tool"
main = "src/index.js"
compatibility_date = "2024-04-05"

[vars]
# 站点基础 URL（独立部署时生效，集成到主项目时会被主站覆盖）
# BASE_URL = "https://your-review-worker.your-subdomain.workers.dev"
# 正文最大字符数（默认 10MB）
# MAX_CONTENT_SIZE = "10485760"
# 附件最大字节数（默认 10MB）
# MAX_ATTACHMENT_SIZE = "10485760"

# D1 数据库绑定（独立部署时使用 DB）
[[d1_databases]]
binding = "DB"
database_name = "reviewdb"
# database_id = "your-database-id"

# R2 对象存储绑定（独立部署时使用 REVIEW_BUCKET）
[[r2_buckets]]
binding = "REVIEW_BUCKET"
bucket_name = "ac-review-storage"
# preview_bucket_name = "ac-review-storage-preview"

# 独立部署时的自定义路由（可选）
# [[routes]]
# pattern = "example.avlcodesite.xyz/review/*"
# custom_domain = true
