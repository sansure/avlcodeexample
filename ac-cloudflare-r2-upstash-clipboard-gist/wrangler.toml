name = "ac-cloudflare-r2-upstash-clipboard-gist"
main = "src/index.js"
compatibility_date = "2024-01-01"

# 免费版 Cloudflare Workers 不支持 cpu_ms 限制，故移除
# cpu_ms = 30000

[vars]
# Upstash Redis REST URL（必填）
# UPSTASH_REDIS_REST_URL = "https://your-name.upstash.io"
# UPSTASH_REDIS_REST_TOKEN = "your-token"
# 可选：自定义基础 URL
# BASE_URL = "https://your-worker.your-subdomain.workers.dev"
# 单次粘贴内容大小限制（字节，默认 1MB）
# MAX_CONTENT_SIZE = "1048576"

[[r2_buckets]]
# 绑定 R2 存储桶用于持久化内容
# binding = "CLIPBOARD_BUCKET"
# bucket_name = "ac-clipboard-gist"